<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 32"
     width="50"
     height="50"
     class="card-icon">

  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FFCC04"/>
    </linearGradient>
  </defs>

  <style>
    .card {
      fill: none;
      stroke: url(#cardGradient);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.25s ease;
    }

    .dot {
      fill: url(#cardGradient);
      transition: fill 0.25s ease;
    }

    .card-icon:hover .card {
      stroke: #FFCC04;
    }

    .card-icon:hover .dot {
      fill: #F59E0B;
    }
  </style>

  <!-- مستطیل کارت -->
  <rect x="3" y="11" width="26" height="4" class="card"/>
  <path d="M29,26H3a1,1,0,0,1-1-1V7A1,1,0,0,1,3,6H29a1,1,0,0,1,1,1V25A1,1,0,0,1,29,26ZM4,24H28V8H4Z" class="card"/>

  <!-- دایره‌های mastercard -->
  <circle cx="21" cy="21" r="1.5" class="dot"/>
  <circle cx="25" cy="21" r="1.5" class="dot"/>
</svg>
